name: portfolio
description: "Mohamed Amine Brahmi — Flutter Developer Portfolio"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^17.1.0
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  visibility_detector: ^0.4.0+2
  json_annotation: ^4.11.0
  url_launcher: ^6.3.2
  provider: ^6.1.5+1
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/svg/
    - assets/images/
