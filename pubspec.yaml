name: portfolio
description: "Mohamed Amine Brahmi — Flutter Developer Portfolio"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^14.2.0
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  visibility_detector: ^0.4.0+2
  json_annotation: ^4.9.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/svg/
